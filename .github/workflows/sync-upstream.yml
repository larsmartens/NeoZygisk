name: Sync Upstream & Daily Build

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-daily
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # ====================================================================
      # 1. CHECKOUT AND SYNC
      # ====================================================================
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/JingMatrix/NeoZygisk.git || true
          git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          NEW_COMMITS=$(git rev-list HEAD..upstream/master --count)
          echo "new_commits=$NEW_COMMITS" >> $GITHUB_OUTPUT
          if [ "$NEW_COMMITS" -eq 0 ]; then
            echo "No new upstream commits."
          else
            echo "Found $NEW_COMMITS new upstream commit(s)."
          fi

      - name: Merge upstream with ours strategy
        if: steps.check.outputs.new_commits != '0'
        run: |
          git merge upstream/master -X ours --no-edit \
            -m "chore: sync upstream JingMatrix/NeoZygisk"

      # ====================================================================
      # 2. RE-APPLY FORK OVERRIDES
      # ====================================================================
      - name: Re-apply fork overrides
        run: |
          # Ensure updateJson points to our fork
          sed -i 's|raw.githubusercontent.com/JingMatrix/NeoZygisk|raw.githubusercontent.com/larsmartens/NeoZygisk|g' build.gradle.kts

      # ====================================================================
      # 3. BUILD
      # ====================================================================
      - name: Setup Java
        if: steps.check.outputs.new_commits != '0'
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        if: steps.check.outputs.new_commits != '0'
        uses: android-actions/setup-android@v3

      - name: Setup Rust toolchain
        if: steps.check.outputs.new_commits != '0'
        run: |
          rustup override set nightly
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android
          rustup target add i686-linux-android
          rustup target add armv7-linux-androideabi

      - name: Setup Ccache
        if: steps.check.outputs.new_commits != '0'
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: sync-${{ runner.os }}-${{ hashFiles('**/build.gradle.kts', '**/gradle.properties') }}

      - name: Cache Rust build artifacts
        if: steps.check.outputs.new_commits != '0'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zygiskd/src -> ../build/intermediates/rust

      - name: Build release zip
        if: steps.check.outputs.new_commits != '0'
        run: ./gradlew zipRelease -Porg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx2048m

      - name: Generate changelog
        if: steps.check.outputs.new_commits != '0'
        run: ./scripts/generate_changelog.sh

      - name: Upload daily build artifact
        if: steps.check.outputs.new_commits != '0'
        uses: actions/upload-artifact@v4
        with:
          name: daily-release
          path: module/build/outputs/release/NeoZygisk-*-release.zip

      # ====================================================================
      # 4. UPDATE ZYGISK.JSON AND RELEASE
      # ====================================================================
      - name: Extract version info and update zygisk.json
        if: steps.check.outputs.new_commits != '0'
        id: version
        run: |
          # Extract version info from build.gradle.kts
          VER_NAME=$(grep 'val verName' build.gradle.kts | sed 's/.*extra("\(.*\)").*/\1/')
          VER_CODE=$(git rev-list HEAD --count)

          echo "ver_name=$VER_NAME" >> $GITHUB_OUTPUT
          echo "ver_code=$VER_CODE" >> $GITHUB_OUTPUT

          # Find the built zip
          RELEASE_ZIP=$(find module/build/outputs/release -type f -name 'NeoZygisk-*-release.zip' | head -1)
          RELEASE_BASENAME=$(basename "$RELEASE_ZIP")
          echo "release_zip=$RELEASE_ZIP" >> $GITHUB_OUTPUT
          echo "release_basename=$RELEASE_BASENAME" >> $GITHUB_OUTPUT

          # Update zygisk.json
          cat > module/zygisk.json <<EOF
          {
          	"version": "$VER_NAME",
          	"versionCode": $VER_CODE,
          	"zipUrl": "https://github.com/larsmartens/NeoZygisk/releases/download/daily/$RELEASE_BASENAME",
          	"changelog": "https://raw.githubusercontent.com/larsmartens/NeoZygisk/master/module/changelog.md"
          }
          EOF

      - name: Commit synced metadata
        if: steps.check.outputs.new_commits != '0'
        run: |
          git add build.gradle.kts module/zygisk.json module/changelog.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync fork metadata for daily build"
          else
            echo "No metadata changes to commit."
          fi

      - name: Push synced branch
        run: |
          for attempt in 1 2 3; do
            git fetch origin master
            git rebase origin/master
            if git push origin HEAD:master; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 5
          done

      - name: Create or update daily release
        if: steps.check.outputs.new_commits != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete daily -R "${{ github.repository }}" --yes 2>/dev/null || true
          git push origin :refs/tags/daily 2>/dev/null || true

          gh release create daily -R "${{ github.repository }}" \
            "${{ steps.version.outputs.release_zip }}" \
            --title "NeoZygisk ${{ steps.version.outputs.ver_name }} daily build" \
            --notes-file module/changelog.md \
            --prerelease
