name: Sync Upstream & Release

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # ====================================================================
      # 1. CHECKOUT AND SYNC
      # ====================================================================
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/JingMatrix/NeoZygisk.git || true
          git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          NEW_COMMITS=$(git rev-list HEAD..upstream/master --count)
          echo "new_commits=$NEW_COMMITS" >> $GITHUB_OUTPUT
          if [ "$NEW_COMMITS" -eq 0 ]; then
            echo "No new upstream commits, skipping sync."
          else
            echo "Found $NEW_COMMITS new upstream commit(s)."
          fi

      - name: Merge upstream with ours strategy
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        run: |
          git merge upstream/master -X ours --no-edit \
            -m "chore: sync upstream JingMatrix/NeoZygisk"

      # ====================================================================
      # 2. RE-APPLY FORK OVERRIDES
      # ====================================================================
      - name: Re-apply fork overrides
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        run: |
          # Ensure updateJson points to our fork
          sed -i 's|raw.githubusercontent.com/JingMatrix/NeoZygisk|raw.githubusercontent.com/larsmartens/NeoZygisk|g' build.gradle.kts

          # Check if anything changed
          if git diff --quiet; then
            echo "No override changes needed."
          else
            git add build.gradle.kts
            git commit -m "chore: re-apply fork updateJson override"
          fi

      - name: Push synced changes
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        run: git push origin HEAD

      # ====================================================================
      # 3. BUILD
      # ====================================================================
      - name: Setup Java
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        uses: android-actions/setup-android@v3

      - name: Setup Rust toolchain
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        run: |
          rustup override set nightly
          rustup target add aarch64-linux-android
          rustup target add x86_64-linux-android
          rustup target add i686-linux-android
          rustup target add armv7-linux-androideabi

      - name: Setup Ccache
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: sync-${{ runner.os }}-${{ hashFiles('**/build.gradle.kts', '**/gradle.properties') }}

      - name: Cache Rust build artifacts
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: zygiskd/src -> ../build/intermediates/rust

      - name: Build release zip
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        run: ./gradlew zipRelease -Porg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx2048m

      # ====================================================================
      # 4. UPDATE ZYGISK.JSON AND RELEASE
      # ====================================================================
      - name: Extract version info and update zygisk.json
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        id: version
        run: |
          # Extract version info from build.gradle.kts
          VER_NAME=$(grep 'val verName' build.gradle.kts | sed 's/.*extra("\(.*\)").*/\1/')
          VER_CODE=$(git rev-list HEAD --count)

          echo "ver_name=$VER_NAME" >> $GITHUB_OUTPUT
          echo "ver_code=$VER_CODE" >> $GITHUB_OUTPUT

          # Find the built zip
          RELEASE_ZIP=$(find module/build/outputs/release -type f -name 'NeoZygisk-*-release.zip' | head -1)
          RELEASE_BASENAME=$(basename "$RELEASE_ZIP")
          echo "release_zip=$RELEASE_ZIP" >> $GITHUB_OUTPUT
          echo "release_basename=$RELEASE_BASENAME" >> $GITHUB_OUTPUT

          # Update zygisk.json
          cat > module/zygisk.json <<EOF
          {
          	"version": "$VER_NAME",
          	"versionCode": $VER_CODE,
          	"zipUrl": "https://github.com/larsmartens/NeoZygisk/releases/download/latest/$RELEASE_BASENAME",
          	"changelog": "https://raw.githubusercontent.com/larsmartens/NeoZygisk/master/module/changelog.md"
          }
          EOF

          # Commit updated zygisk.json
          git add module/zygisk.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update zygisk.json to $VER_NAME ($VER_CODE)"
            git push origin HEAD
          fi

      - name: Create or update release
        if: steps.check.outputs.new_commits != '0' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing 'latest' release if present
          gh release delete latest -R "${{ github.repository }}" --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          gh release create latest -R "${{ github.repository }}" \
            "${{ steps.version.outputs.release_zip }}" \
            --title "NeoZygisk ${{ steps.version.outputs.ver_name }} (larsmartens fork)" \
            --notes "Auto-synced from upstream JingMatrix/NeoZygisk with Magisk Alpha compatibility patch.

          **Version**: ${{ steps.version.outputs.ver_name }}
          **Version Code**: ${{ steps.version.outputs.ver_code }}

          Install via Magisk/KernelSU/APatch module manager." \
            --latest
